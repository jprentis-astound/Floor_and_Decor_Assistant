[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc", "stdenv.cc"]

[phases.install]
cmds = ["cd roomy-assistant/packages/agent && python3 -m pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "cd roomy-assistant/packages/agent && python -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}"
