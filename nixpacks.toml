[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = ["cd roomy-assistant/packages/agent && python3 -m venv /app/venv && /app/venv/bin/pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "cd roomy-assistant/packages/agent && /app/venv/bin/python -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}"
